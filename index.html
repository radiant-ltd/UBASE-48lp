<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBASE 動作確認</title>
<style>
body{font-family:sans-serif;background:#0D1B2E;color:#fff;padding:20px;font-size:14px;}
.log{background:#000;padding:12px;margin:10px 0;border-radius:4px;min-height:40px;line-height:1.8;font-size:12px;}
.ok{color:#0f0;}.ng{color:#f44;}.info{color:#ff0;}
.ew{position:relative;width:100%;padding-bottom:177.78%;background:#000;margin:16px 0;}
.ew iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
h2{color:#D9323B;margin-bottom:8px;font-size:16px;}
</style>
</head>
<body>
<h2>UBASE 動作確認ページ</h2>
<p style="font-size:12px;color:#aaa;">このページはテスト用です。以下のログを担当者に共有してください。</p>

<div class="log" id="log">起動中...</div>

<div class="ew">
  <iframe id="vimeo-test"
    src="https://player.vimeo.com/video/1191024711?badge=0&autopause=0&player_id=test&app_id=58479&title=0&byline=0&portrait=0"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<div style="margin-top:12px;font-size:12px;color:#aaa;">
  動画を10秒以上再生してからログを確認してください
</div>

<script>
const log = document.getElementById('log');
log.innerHTML = '';

function addLog(msg, type) {
  const cls = type || 'info';
  const time = new Date().toLocaleTimeString();
  log.innerHTML += '<div class="' + cls + '">[' + time + '] ' + msg + '</div>';
  console.log('[TEST]', msg);
}

addLog('✅ JavaScriptが動作しています', 'ok');
addLog('ブラウザ: ' + navigator.userAgent.substring(0, 80), 'info');

// Vimeo API読み込みテスト
addLog('Vimeo APIを読み込み中...', 'info');
const s = document.createElement('script');
s.src = 'https://player.vimeo.com/api/player.js';

s.onload = function() {
  addLog('✅ Vimeo API 読み込み成功', 'ok');

  const iframe = document.getElementById('vimeo-test');
  const player = new Vimeo.Player(iframe);

  addLog('Playerオブジェクト作成完了', 'ok');

  player.ready().then(function() {
    addLog('✅ player.ready() 成功', 'ok');

    player.getDuration().then(function(d) {
      addLog('✅ 動画の長さ: ' + Math.floor(d) + '秒', 'ok');
    });

    player.on('timeupdate', function(data) {
      if (Math.floor(data.seconds) % 5 === 0 && data.seconds > 0) {
        addLog('✅ timeupdate: ' + Math.floor(data.seconds) + '秒', 'ok');
      }
    });

    // ポーリングテスト
    let pollCount = 0;
    const poll = setInterval(function() {
      pollCount++;
      player.getCurrentTime().then(function(t) {
        if (pollCount <= 3 || pollCount % 5 === 0) {
          addLog('✅ getCurrentTime: ' + t.toFixed(1) + '秒', 'ok');
        }
      });
      if (pollCount > 20) clearInterval(poll);
    }, 1000);

  }).catch(function(e) {
    addLog('❌ player.ready() 失敗: ' + e.message, 'ng');
  });
};

s.onerror = function() {
  addLog('❌ Vimeo API 読み込み失敗（ネットワークエラー）', 'ng');
  addLog('→ player.vimeo.com へのアクセスがブロックされています', 'ng');
};

document.head.appendChild(s);
</script>
</body>
</html>
